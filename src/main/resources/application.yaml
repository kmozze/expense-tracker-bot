spring:
  datasource:
    url: ${DB_URL}
    username: ${DB_USER}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.yaml
    enabled: true

  application:
    name: expense-tracker-bot

  jooq:
    sql-dialect: POSTGRES

bot:
    name: ${BOT_NAME}
    token: ${BOT_TOKEN}
