version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: expense-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: expense_db
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
